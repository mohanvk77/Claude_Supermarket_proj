services:
  - type: web
    name: supermarket-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: JWT_SECRET
        value: supermarket_jwt_secret_key_2024
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        value: https://supermarket-frontend.onrender.com

  - type: web
    name: supermarket-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://supermarket-backend.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html